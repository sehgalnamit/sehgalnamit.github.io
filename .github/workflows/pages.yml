name: Build and deploy GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check Ruby and Bundler
        run: |
          ruby --version
          gem --version
          gem install bundler --version 2.4.22 || gem install bundler
          bundler --version

      - name: Show Gemfile
        run: cat Gemfile

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build site (verbose)
        run: |
          echo "Working directory: \C:\Users\TS\Documents\git\namitsehgal-site"
          echo "Files in root:"
          ls -la
          echo ""
          echo "Building Jekyll..."
          bundle exec jekyll build -d ./_site -V

      - name: Debug: list generated files
        run: |
          echo "_site contents:"
          ls -laR ./_site || echo "_site directory not found"

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./_site